<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Netflix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🎬 Mi Netflix</h1>

<input type="text" id="buscador" placeholder="Buscar películas..." onkeyup="buscar()">

<p id="texto">Disfruta del contenido</p>

<h2>⭐ Mi lista</h2>
<div id="favoritos"></div>

<h2>🔥 Tendencias</h2>
<div class="fila">

  <div class="card">
    <img class="poster" src="https://picsum.photos/300/200?1">
    <div class="info">
      <h3>Peli 1</h3>
      <button onclick="verTrailer('https://www.w3schools.com/html/mov_bbb.mp4')">▶ Ver</button>
      <button onclick="guardarFavorito('Peli 1')" class="fav">⭐</button>
    </div>
  </div>

  <div class="card">
    <img class="poster" src="https://picsum.photos/300/200?2">
    <div class="info">
      <h3>Peli 2</h3>
      <button onclick="verTrailer('https://www.w3schools.com/html/mov_bbb.mp4')">▶ Ver</button>
      <button onclick="guardarFavorito('Peli 2')" class="fav">⭐</button>
    </div>
  </div>

</div>

<h2>😂 Comedia</h2>
<div class="fila">

  <div class="card">
    <img class="poster" src="https://picsum.photos/300/200?3">
    <div class="info">
      <h3>Comedia 1</h3>
      <button onclick="verTrailer('https://www.w3schools.com/html/mov_bbb.mp4')">▶ Ver</button>
      <button onclick="guardarFavorito('Comedia 1')" class="fav">⭐</button>
    </div>
  </div>

</div>

<!-- 🔥 API REAL -->
<h2>🔥 Películas reales</h2>
<div id="peliculas" class="fila"></div>

<div class="botones">
  <button onclick="cambiar()">🔁 Cambiar</button>
  <button onclick="modo()">🌙 Modo</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- 🎬 MODAL VIDEO -->
<div id="videoModal" class="modal">
  <div class="modal-content">
    <span onclick="cerrarVideo()" class="cerrar">&times;</span>
    <video id="video" width="100%" controls></video>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
